<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Wellness Journal | יומן רווחה</title>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Wellness"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="apple-touch-startup-image" href="icon-512.png"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.462.0/dist/umd/lucide.min.js"></script>

<style>
:root {
  --indigo: #1a1a2e;
  --indigo-mid: #252545;
  --indigo-light: #2f2f5a;
  --lavender: #b8a9d4;
  --lavender-dim: #7a6e99;
  --blush: #e8b4b8;
  --sage: #8fb3a8;
  --moon: #f0edf7;
  --moon-dim: #c5bfd8;
  --text: #f0edf7;
  --text-dim: #9b94b3;
  --card: rgba(255,255,255,0.06);
  --card-hover: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.1);
  --radius: 18px;
  --radius-sm: 10px;
  --font-en: 'Inter', sans-serif;
  --font-he: 'Heebo', sans-serif;
  --font-display: 'DM Serif Display', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--indigo);
  color: var(--text);
  font-family: var(--font-en);
  min-height: 100vh; /* iOS fallback */
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

body.rtl { font-family: var(--font-he); direction: rtl; }

/* ── SETUP SCREEN ── */
#setup-screen {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  padding-top: calc(2rem + env(safe-area-inset-top));
  padding-bottom: calc(2rem + env(safe-area-inset-bottom));
  gap: 2rem;
  text-align: center;
}

.setup-orb {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--lavender), var(--indigo-light));
  box-shadow: 0 0 40px rgba(184,169,212,0.4);
  animation: breathe 4s ease-in-out infinite;
}

.setup-title {
  font-family: var(--font-display);
  font-size: 2rem;
  line-height: 1.2;
  color: var(--moon);
}
.setup-title span { color: var(--lavender); font-style: italic; }
.setup-sub { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; max-width: 320px; }

.setup-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.setup-card label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
.setup-card input {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 1rem; /* ≥16px prevents iOS auto-zoom */
  padding: 0.75rem 1rem;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.setup-card input:focus { border-color: var(--lavender); }
.setup-card input::placeholder { color: var(--text-dim); }

.lang-toggle {
  display: flex;
  gap: 0.5rem;
}
.lang-btn {
  flex: 1;
  padding: 0.6rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.lang-btn.active {
  background: var(--lavender);
  border-color: var(--lavender);
  color: var(--indigo);
  font-weight: 600;
}

.btn-primary {
  background: linear-gradient(135deg, var(--lavender), var(--blush));
  border: none;
  border-radius: var(--radius-sm);
  color: var(--indigo);
  cursor: pointer;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 0.85rem 1.5rem;
  width: 100%;
  transition: opacity 0.2s, transform 0.15s;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── APP SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
#app.visible { display: flex; }

.app-header {
  padding: calc(env(safe-area-inset-top) + 0.75rem) 1.25rem 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(26,26,46,0.92);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  z-index: 50;
}

.app-logo {
  font-family: var(--font-display);
  font-size: 1.2rem;
  color: var(--moon);
}
.app-logo span { color: var(--lavender); font-style: italic; }

.header-actions { display: flex; gap: 0.5rem; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: all 0.2s;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
}
.icon-btn:hover { background: var(--card-hover); color: var(--text); }
.icon-btn:active { opacity: 0.7; }

.app-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.25rem; }

/* ── TABS ── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(26,26,46,0.96);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 0.5rem env(safe-area-inset-right) calc(0.5rem + env(safe-area-inset-bottom)) env(safe-area-inset-left);
  z-index: 50;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 0.4rem;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  transition: color 0.2s;
}
.tab-btn .tab-icon { display: flex; align-items: center; justify-content: center; }
.tab-btn.active { color: var(--lavender); }

.tab-content { display: none; padding-bottom: 5rem; }
.tab-content.active { display: block; }

/* ── WRITE TAB ── */
.mood-section { margin-bottom: 1.5rem; }
.section-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}

.mood-orb-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.mood-orb {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--orb-color, var(--lavender)), var(--indigo-light));
  box-shadow: 0 0 40px var(--orb-glow, rgba(184,169,212,0.35));
  animation: breathe 4s ease-in-out infinite;
  transition: background 0.6s, box-shadow 0.6s;
  cursor: default;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.07); }
}

/* ── MOOD SLIDER ── */
.mood-slider-wrap {
  margin-bottom: 1.5rem;
  padding: 0 0.25rem;
}

.mood-slider-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}
.mood-slider-labels span {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.03em;
}

.mood-slider-track {
  position: relative;
  height: 36px;
  display: flex;
  align-items: center;
  margin-bottom: 0.75rem;
}

/* Gradient track background */
.mood-slider-track::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right,
    #6b3a4a, #7a4a5e, #7a6070, #6a7a9e, #6a8aae,
    #7a8aaa, #8a8ab0, #8a9ab8, #7a9eb8, #7aaeb0,
    #7ab8a0, #8fb88a, #b8b46a, #d4a0c8, #e8c4d0
  );
}
/* In RTL (Hebrew) the native range input flips so 0 sits on the right.
   Flip the gradient direction too so the red "Suffering / סובל" end
   stays under the thumb's actual min position instead of the left side. */
.rtl .mood-slider-track::before {
  background: linear-gradient(to left,
    #6b3a4a, #7a4a5e, #7a6070, #6a7a9e, #6a8aae,
    #7a8aaa, #8a8ab0, #8a9ab8, #7a9eb8, #7aaeb0,
    #7ab8a0, #8fb88a, #b8b46a, #d4a0c8, #e8c4d0
  );
}

input[type=range].mood-range {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  background: transparent;
  position: relative;
  z-index: 1;
  cursor: pointer;
  touch-action: manipulation;
}

input[type=range].mood-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--moon);
  border: 3px solid var(--thumb-color, var(--lavender));
  box-shadow: 0 0 12px var(--thumb-glow, rgba(184,169,212,0.5));
  transition: border-color 0.3s, box-shadow 0.3s;
  cursor: grab;
}
input[type=range].mood-range::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.15); }

input[type=range].mood-range::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--moon);
  border: 3px solid var(--thumb-color, var(--lavender));
  box-shadow: 0 0 12px var(--thumb-glow, rgba(184,169,212,0.5));
  transition: border-color 0.3s, box-shadow 0.3s;
  cursor: grab;
}

input[type=range].mood-range:focus { outline: none; }

.mood-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  padding: 0.6rem 1rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 100px;
  transition: border-color 0.3s;
}
.mood-display .mood-emoji { display: flex; align-items: center; }
.mood-display .mood-name {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--moon);
  min-width: 80px;
  text-align: center;
  transition: color 0.3s;
}

.write-area {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
}
.write-area textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem; /* ≥16px prevents iOS auto-zoom */
  line-height: 1.7;
  min-height: 160px;
  outline: none;
  resize: none;
  -webkit-appearance: none;
  appearance: none;
  -webkit-touch-callout: none;
}
.rtl .write-area textarea { font-family: var(--font-he); text-align: right; }
.write-area textarea::placeholder { color: var(--text-dim); }

.write-actions { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
.btn-secondary {
  flex: 1;
  padding: 0.75rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: all 0.2s;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
}
.btn-secondary:hover { background: var(--card-hover); }
.btn-secondary:active { opacity: 0.75; }

/* AI Panel */
.ai-panel {
  background: linear-gradient(135deg, rgba(184,169,212,0.08), rgba(232,180,184,0.06));
  border: 1px solid rgba(184,169,212,0.2);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
  display: none;
}
.ai-panel.visible { display: block; }
.ai-panel-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  font-size: 0.75rem;
  color: var(--lavender);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.ai-panel-body {
  color: var(--moon-dim);
  font-size: 0.95rem;
  line-height: 1.7;
  white-space: pre-wrap;
}
.ai-loading {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 0.5rem 0;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--lavender);
  animation: dotpulse 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotpulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── HISTORY TAB ── */
.entry-list { display: flex; flex-direction: column; gap: 0.75rem; }

.entry-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  cursor: pointer;
  transition: background 0.2s;
}
.entry-card:hover { background: var(--card-hover); }
.entry-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.entry-mood-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.entry-date { font-size: 0.75rem; color: var(--text-dim); }
.entry-preview {
  font-size: 0.9rem;
  color: var(--moon-dim);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.rtl .entry-preview { text-align: right; font-family: var(--font-he); }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-dim);
}
.empty-state .empty-icon { display: flex; justify-content: center; margin-bottom: 0.75rem; opacity: 0.6; }
.empty-state p { font-size: 0.9rem; line-height: 1.6; }

/* ── INSIGHTS TAB ── */
.insights-grid { display: flex; flex-direction: column; gap: 1rem; }

.insight-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}
.insight-card h3 {
  font-size: 0.75rem;
  color: var(--lavender);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}
.insight-card p { font-size: 0.9rem; color: var(--moon-dim); line-height: 1.6; }

.mood-bar-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
.mood-bar-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
}
.mood-bar-row .emoji { width: 24px; display: flex; align-items: center; justify-content: center; }
.mood-bar-bg {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.mood-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--lavender), var(--blush));
  transition: width 0.8s ease;
}
.mood-bar-count { font-size: 0.75rem; color: var(--text-dim); min-width: 20px; text-align: right; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 1rem;
  padding-bottom: calc(1rem + env(safe-area-inset-bottom));
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--indigo-mid);
  border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 1.5rem;
  padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 500px;
  max-height: 80dvh;
  max-height: 80vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1rem;
}
.modal-header h2 { font-family: var(--font-display); font-size: 1.3rem; color: var(--moon); }

.modal-body { font-size: 0.95rem; color: var(--moon-dim); line-height: 1.7; }
.rtl .modal-body { font-family: var(--font-he); text-align: right; }

.modal-meta { margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--text-dim); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 5.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--indigo-light);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.6rem 1.25rem;
  font-size: 0.85rem;
  color: var(--text);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SETTINGS PANEL ── */
.settings-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
  display: none;
}
.settings-panel.open { display: block; }
.settings-row {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.settings-row:last-child { margin-bottom: 0; }
.settings-label { font-size: 0.8rem; color: var(--text-dim); }

@media (prefers-reduced-motion: reduce) {
  .mood-orb, .setup-orb { animation: none; }
}

/* ── WIDE VIEWPORTS ──
   This is a mobile-first layout; on phones/narrow windows it already
   fills the screen edge-to-edge as designed. On wider windows (desktop,
   tablet landscape) frame it as a centered panel instead of stretching
   everything across the full width. */
@media (min-width: 720px) {
  body {
    background:
      radial-gradient(circle at 50% 0%, rgba(184,169,212,0.08), transparent 60%),
      #12101f;
  }
  #setup-screen, #app {
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 0 0 1px var(--border), 0 30px 80px rgba(0,0,0,0.45);
  }
  .tab-bar {
    width: 100%;
    max-width: 480px;
    left: 50%;
    right: auto;
    transform: translateX(-50%);
  }
}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-orb"></div>
  <div>
    <div class="setup-title">Wellness <span>Journal</span><br/>יומן <span>רווחה</span></div>
  </div>
  <p class="setup-sub">Your private space to reflect, feel, and grow — powered by AI.</p>
  <div class="setup-card">
    <div>
      <label>Language / שפה</label>
      <div class="lang-toggle" style="margin-top:0.5rem">
        <button class="lang-btn active" id="lang-en" onclick="setLang('en')">English</button>
        <button class="lang-btn" id="lang-he" onclick="setLang('he')">עברית</button>
      </div>
    </div>
    <button class="btn-primary" id="setup-btn" onclick="completeSetup()">Begin journaling →</button>
  </div>
</div>

<!-- APP SHELL -->
<div id="app">
  <header class="app-header">
    <div class="app-logo" id="app-logo">Wellness <span>Journal</span></div>
    <div class="header-actions">
      <button class="icon-btn" title="Settings" onclick="toggleSettings()"><i data-lucide="settings" width="18" height="18"></i></button>
    </div>
  </header>

  <main class="app-content">
    <!-- WRITE -->

// ── MOOD FACE ICONS ──
// There's no off-the-shelf icon set with 15 graduated facial expressions, so
// these are generated: a circle face whose eyebrows, eyes, and mouth curve
// shift smoothly from a pained frown (index 0) through neutral (index 7) to
// a closed-eyes smile (index 14), styled to match the Lucide icons used
// elsewhere (thin stroke, rounded caps, currentColor-style coloring).
function moodFaceSVG(index, color, size = 24) {
  const valence = (index / 14 - 0.5) * 2; // -1 (Suffering) .. 1 (Blissful)
  const cx = 12, cy = 12, r = 9;

  const mouthY = 15.5;
  const mouthHalfW = 3.6 + Math.abs(valence) * 1.2;
  const ctrlY = mouthY + valence * 6.4;
  const mouthPath = `M${cx - mouthHalfW} ${mouthY} Q${cx} ${ctrlY} ${cx + mouthHalfW} ${mouthY}`;

  const browDroop = Math.max(0, -valence) * 2.2;
  const browY = 8.3, browInset = 2.6, browSpan = 2.2;
  const leftBrow  = `M${cx - browInset - browSpan} ${browY + browDroop} L${cx - browInset} ${browY}`;
  const rightBrow = `M${cx + browInset} ${browY} L${cx + browInset + browSpan} ${browY + browDroop}`;

  const eyeY = 10.2, eyeOffsetX = 3.6;
  let eyesSVG;
  if (index === 0) {
    // squeezed shut — pained
    eyesSVG = `<path d="M${cx-eyeOffsetX-1.1} ${eyeY} q1.1 1 2.2 0 M${cx+eyeOffsetX-1.1} ${eyeY} q1.1 1 2.2 0" stroke="${color}" stroke-width="1.4" stroke-linecap="round" fill="none"/>`;
  } else if (index >= 12) {
    // closed, upward crescents — joyful
    eyesSVG = `<path d="M${cx-eyeOffsetX-1.3} ${eyeY+0.5} q1.3 -1.5 2.6 0 M${cx+eyeOffsetX-1.3} ${eyeY+0.5} q1.3 -1.5 2.6 0" stroke="${color}" stroke-width="1.4" stroke-linecap="round" fill="none"/>`;
  } else {
    eyesSVG = `<circle cx="${cx-eyeOffsetX}" cy="${eyeY}" r="0.9" fill="${color}"/><circle cx="${cx+eyeOffsetX}" cy="${eyeY}" r="0.9" fill="${color}"/>`;
  }

  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:block">
<circle cx="${cx}" cy="${cy}" r="${r}" stroke="${color}" stroke-width="1.6"/>
<path d="${leftBrow}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
<path d="${rightBrow}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
${eyesSVG}
<path d="${mouthPath}" stroke="${color}" stroke-width="1.6" stroke-linecap="round" fill="none"/>
</svg>`;
}

// ── MOOD SLIDER ──
function buildMoodGrid() {
  // Update labels for current language
  updateSliderLabels();
  // Init at neutral (index 7)
  onSliderMove(7);
}

function updateSliderLabels() {
  const isHe = state.lang === 'he';
  const labels = document.querySelectorAll('.mood-slider-labels span');
  if (labels.length === 2) {
    labels[0].innerHTML = `${moodFaceSVG(0, MOODS[0].color, 14)} ${isHe ? 'סובל' : 'Suffering'}`;
    labels[1].innerHTML = `${isHe ? 'אושר מלא' : 'Blissful'} ${moodFaceSVG(14, MOODS[14].color, 14)}`;
  }
}

function onSliderMove(val) {
  const i = parseInt(val);
  const m = MOODS[i];
  // Update display pill
  document.getElementById('mood-emoji').innerHTML = moodFaceSVG(i, m.color, 22);
  const nameEl = document.getElementById('mood-name');
  nameEl.textContent = state.lang === 'he' ? m.labelHe : m.label;
  nameEl.style.color = m.color;
  // Update display border
  const display = document.getElementById('mood-display');
  display.style.borderColor = m.color + '88';
  // Update orb
  const orb = document.getElementById('mood-orb');
  orb.style.background = `radial-gradient(circle at 35% 35%, ${m.color}, #2f2f5a)`;
  orb.style.boxShadow = `0 0 40px ${m.glow}`;
  // Update thumb color via CSS var on the slider
  const slider = document.getElementById('mood-slider');
  slider.style.setProperty('--thumb-color', m.color);
  slider.style.setProperty('--thumb-glow', m.glow);
  // Commit immediately (every move counts)
  state.selectedMood = i;
}

function onSliderCommit(val) {
  state.selectedMood = parseInt(val);
}

function selectMood(i) {
  // kept for compatibility — set slider position
  document.getElementById('mood-slider').value = i;
  onSliderMove(i);
}

// ── AI PROXY ──
// Calls the Cloudflare Worker (worker/worker.js) instead of an AI provider
// directly, so no personal API key is needed on this device — the worker
// holds the key server-side. After deploying the worker (see README),
// paste the resulting *.workers.dev URL below.
const WORKER_URL = 'https://wellness-journal-api.gefenrose.workers.dev';

async function callAI(prompt) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || 'request_failed');
  return data.content?.[0]?.text || '';
}

// ── AI FEATURES ──
async function getPrompt() {
  const mood = state.selectedMood !== null ? MOODS[state.selectedMood] : null;
  const moodStr = mood ? (state.lang==='he' ? mood.labelHe : mood.label) : 'neutral';
  const lang = state.lang === 'he' ? 'Hebrew' : 'English';

  const panel = document.getElementById('prompt-panel');
  const body = document.getElementById('prompt-body');
  panel.classList.add('visible');
  body.innerHTML = `<div class="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

  try {
    const prompt = `You are a compassionate wellness journal guide. Generate ONE thoughtful, emotionally intelligent journal prompt for someone feeling ${moodStr}. The prompt should help them explore their feelings with curiosity and self-compassion. Write in ${lang}. Be warm, specific, and avoid clichés. 2-3 sentences max.`;
    const text = await callAI(prompt);
    body.innerHTML = text;
  } catch(e) {
    body.innerHTML = handleError(e);
  }
}

async function reflectEntry() {
  const text = document.getElementById('entry-text').value.trim();
  if (!text) { showToast(t('toastNeedText')); return; }

  const mood = state.selectedMood !== null ? MOODS[state.selectedMood] : null;
  const moodStr = mood ? (state.lang==='he' ? mood.labelHe : mood.label) : 'unspecified';
  const lang = state.lang === 'he' ? 'Hebrew' : 'English';

  const panel = document.getElementById('reflect-panel');
  const body = document.getElementById('reflect-body');
  panel.classList.add('visible');
  body.innerHTML = `<div class="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

  try {
    const prompt = `You are a warm, insightful wellness coach. Read this journal entry written by someone feeling ${moodStr}:\n\n"${text}"\n\nProvide a brief, compassionate reflection (3-4 sentences) in ${lang}. Notice patterns, validate emotions, and offer one gentle insight. Be human, not clinical.`;
    const result = await callAI(prompt);
    body.innerHTML = result;
  } catch(e) {
    body.innerHTML = handleError(e);
  }
}

function handleError(e) {
  return `<span style="color:var(--blush)">${t('toastError')}</span>`;
}

// ── SAVE ENTRY ──
function saveEntry() {
  const text = document.getElementById('entry-text').value.trim();
  if (!text) { showToast(t('toastNeedText')); return; }

  const entry = {
    id: Date.now().toString(),
    text,
    mood: state.selectedMood,
    reflection: document.getElementById('reflect-body').textContent || '',
    timestamp: Date.now(),
    lang: state.lang,
  };

  state.entries.unshift(entry);
  localStorage.setItem('wj_entries', JSON.stringify(state.entries));

  // Firebase
  if (window._fbDb) {
    try {
      window._fbPush(window._fbRef(window._fbDb, 'entries'), {...entry, serverTime: window._fbTimestamp()});
    } catch(e) { console.warn('Firebase write failed', e); }
  }

  // Reset
  document.getElementById('entry-text').value = '';
  state.selectedMood = null;
  document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
  const orb = document.getElementById('mood-orb');
  orb.style.background = '';
  orb.style.boxShadow = '';
  ['prompt-panel','reflect-panel'].forEach(id => {
    document.getElementById(id).classList.remove('visible');
  });

  showToast(t('toastSaved'));
  renderHistory();
  renderInsights();
}

// ── HISTORY ──
function renderHistory() {
  const list = document.getElementById('entry-list');
  if (!state.entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon"><i data-lucide="book-open" width="40" height="40"></i></div><p>${t('emptyHistory')}</p></div>`;
    lucide.createIcons();
    return;
  }
  list.innerHTML = state.entries.map((e,i) => {
    const m = e.mood !== null && e.mood !== undefined ? MOODS[e.mood] : null;
    const date = new Date(e.timestamp).toLocaleDateString(state.lang==='he'?'he-IL':'en-US', {weekday:'short',month:'short',day:'numeric'});
    return `
      <div class="entry-card" onclick="openEntry(${i})">
        <div class="entry-meta">
          ${m ? `<div class="entry-mood-dot" style="background:${m.color}"></div><span style="display:inline-flex">${moodFaceSVG(e.mood, m.color, 16)}</span>` : ''}
          <span class="entry-date">${date}</span>
        </div>
        <div class="entry-preview ${state.lang==='he'?'rtl':''}">${e.text}</div>
      </div>
    `;
  }).join('');
}

function openEntry(i) {
  const e = state.entries[i];
  const m = e.mood !== null && e.mood !== undefined ? MOODS[e.mood] : null;
  const date = new Date(e.timestamp).toLocaleDateString(state.lang==='he'?'he-IL':'en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('modal-date').textContent = date;
  document.getElementById('modal-meta').innerHTML = m ? `<span style="display:inline-flex">${moodFaceSVG(e.mood, m.color, 18)}</span> <span style="color:${m.color}">${state.lang==='he'?m.labelHe:m.label}</span>` : '';
  let body = `<p>${e.text}</p>`;
  if (e.reflection) body += `<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:0.85rem;color:var(--text-dim)"><div style="display:flex;align-items:center;gap:0.35rem;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--lavender);margin-bottom:0.5rem"><i data-lucide="brain" width="13" height="13"></i> Reflection</div>${e.reflection}</div>`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-body').classList.toggle('rtl', e.lang==='he');
  document.getElementById('entry-modal').classList.add('open');
  lucide.createIcons();
}

function closeModal(e) {
  if (e.target.id === 'entry-modal') closeEntryModal();
}
function closeEntryModal() {
  document.getElementById('entry-modal').classList.remove('open');
}

// ── INSIGHTS ──
function renderInsights() {
  const grid = document.getElementById('insights-grid');
  if (!state.entries.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i data-lucide="brain" width="40" height="40"></i></div><p>${t('emptyHistory')}</p></div>`;
    lucide.createIcons();
    return;
  }

  // Mood frequency
  const moodCounts = {};
  state.entries.forEach(e => {
    if (e.mood !== null && e.mood !== undefined) moodCounts[e.mood] = (moodCounts[e.mood]||0)+1;
  });
  const maxCount = Math.max(...Object.values(moodCounts), 1);
  const moodBars = MOODS.map((m,i) => {
    const count = moodCounts[i] || 0;
    if (!count) return '';
    return `<div class="mood-bar-row">
      <span class="emoji">${moodFaceSVG(i, m.color, 16)}</span>
      <div class="mood-bar-bg"><div class="mood-bar-fill" style="width:${(count/maxCount)*100}%;background:linear-gradient(90deg,${m.color},${m.color}88)"></div></div>
      <span class="mood-bar-count">${count}</span>
    </div>`;
  }).filter(Boolean).join('');

  // Streak
  const days = [...new Set(state.entries.map(e => new Date(e.timestamp).toDateString()))];
  let streak = 0;
  const today = new Date().toDateString();
  let check = new Date();
  while(days.includes(check.toDateString())) {
    streak++;
    check.setDate(check.getDate()-1);
  }

  grid.innerHTML = `
    <div class="insight-card">
      <h3>${t('insightMoods')}</h3>
      <div class="mood-bar-wrap">${moodBars || '<p>No mood data yet.</p>'}</div>
    </div>
    <div class="insight-card">
      <h3>${t('insightStreak')}</h3>
      <p style="font-size:2rem;font-family:var(--font-display);color:var(--lavender)">${streak}</p>
      <p style="margin-top:0.25rem">${t('streakDays')(streak)}</p>
    </div>
    <div class="insight-card" id="insight-ai-card">
      <h3>${t('insightAI')}</h3>
      <p id="insight-ai-text" style="color:var(--text-dim);font-size:0.85rem">${t('insightAITap')}</p>
      <button class="btn-secondary" style="margin-top:0.75rem;width:100%" onclick="getWeeklyReflection()"><i data-lucide="sparkles" width="15" height="15"></i> Generate</button>
    </div>
  `;
  lucide.createIcons();
}

async function getWeeklyReflection() {
  const el = document.getElementById('insight-ai-text');
  el.innerHTML = `<div class="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

  const recent = state.entries.slice(0, 7);
  const summary = recent.map(e => {
    const m = e.mood !== null && e.mood !== undefined ? MOODS[e.mood].label : 'unknown';
    return `- Mood: ${m}. "${e.text.substring(0,120)}"`;
  }).join('\n');

  const lang = state.lang === 'he' ? 'Hebrew' : 'English';
  try {
    const result = await callAI(`You are a compassionate wellness coach. Here are someone's recent journal entries:\n${summary}\n\nWrite a warm, insightful weekly reflection in ${lang} (4-5 sentences). Notice emotional patterns, celebrate resilience, and offer gentle encouragement. Avoid clichés.`);
    el.innerHTML = result;
  } catch(e) {
    el.innerHTML = handleError(e);
  }
}

// ── UI HELPERS ──
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  btn.classList.add('active');
  if (tab === 'history') renderHistory();
  if (tab === 'insights') renderInsights();
}

function toggleSettings() {
  const p = document.getElementById('settings-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    document.getElementById('slang-en').classList.toggle('active', state.lang==='en');
    document.getElementById('slang-he').classList.toggle('active', state.lang==='he');
  }
}

function saveSettings() {
  localStorage.setItem('wj_lang', state.lang);
  document.getElementById('settings-panel').classList.remove('open');
  applyLang();
  buildMoodGrid();
  renderHistory();
  showToast(t('toastSettingsSaved'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function loadFromFirebase() {
  if (!window._fbDb) return;
  try {
    window._fbOnValue(window._fbRef(window._fbDb, 'entries'), snap => {
      const data = snap.val();
      if (!data) return;
      const remote = Object.values(data).sort((a,b) => b.timestamp - a.timestamp);
      // Merge: add remote entries not in local
      const localIds = new Set(state.entries.map(e => e.id));
      remote.forEach(e => { if (!localIds.has(e.id)) state.entries.push(e); });
      state.entries.sort((a,b) => b.timestamp - a.timestamp);
      localStorage.setItem('wj_entries', JSON.stringify(state.entries));
      renderHistory();
      renderInsights();
    });
  } catch(e) { console.warn('Firebase read failed', e); }
}

// ── INIT ──
window.onSliderMove = onSliderMove;
window.onSliderCommit = onSliderCommit;
window.setLang = setLang;
window.completeSetup = completeSetup;
window.selectMood = selectMood;
window.getPrompt = getPrompt;
window.reflectEntry = reflectEntry;
window.saveEntry = saveEntry;
window.openEntry = openEntry;
window.closeModal = closeModal;
window.closeEntryModal = closeEntryModal;
window.switchTab = switchTab;
window.toggleSettings = toggleSettings;
window.saveSettings = saveSettings;
window.getWeeklyReflection = getWeeklyReflection;

// Check if already set up
if (localStorage.getItem('wj_setup_done')) {
  launchApp();
} else {
  // Pre-select lang on setup screen
  setLang(state.lang);
}
</script>
